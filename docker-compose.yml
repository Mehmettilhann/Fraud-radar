version: '3.8'

services:
  # 1. VERİTABANI (PostgreSQL)
  postgres:
    image: postgres:15
    container_name: fraud_postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: fraud_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d fraud_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - fraud-network

  # 2. MESAJ KUYRUĞU (RabbitMQ)
  rabbitmq:
    image: rabbitmq:3-management
    container_name: fraud_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: secretpassword
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - fraud-network

  # 3. CACHE / KURAL MOTORU HAFIZASI (Redis)
  redis:
    image: redis:alpine
    container_name: fraud_redis
    ports:
      - "6379:6379"
    networks:
      - fraud-network

  # 4. BACKEND API (FastAPI)
  api:
    build: .
    container_name: fraud_api
    command: uvicorn apps.api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://user:password@postgres:5432/fraud_db
      - RABBITMQ_URL=amqp://admin:secretpassword@rabbitmq:5672/
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_started
    networks:
      - fraud-network

  # 5. KURAL MOTORU (Worker)
  worker:
    build: .
    container_name: fraud_worker
    networks:
      - fraud-network
    command: python apps/worker/main.py
    environment:
      - DATABASE_URL=postgresql://user:password@postgres:5432/fraud_db
      - RABBITMQ_URL=amqp://admin:secretpassword@rabbitmq:5672/
      - REDIS_HOST=redis
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_started
      redis:
        condition: service_started
      api:
        condition: service_started

  # 6. MCP SERVER (Yapay Zeka Bağlantısı)
# 6. MCP SERVER (Yapay Zeka Bağlantısı)
  mcp:
    build: .
    container_name: fraud-mcp
    command: python apps/mcp/main.py
    depends_on:
      - api
    networks:
      - fraud-network
    stdin_open: true 
    tty: true        

  # 7. FRONTEND DASHBOARD (React)
  frontend:
    build: ./frontend
    container_name: fraud_frontend
    ports:
      - "5173:5173"
    depends_on:
      - api
    networks:
      - fraud-network

networks:
  fraud-network:
    driver: bridge